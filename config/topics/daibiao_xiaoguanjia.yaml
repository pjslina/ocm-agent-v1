topic_id: daibiao_xiaoguanjia
display_name: 代表小管家
default_route: metagc

history:
  max_turns: 10
  scope: per_topic

auth:
  plugin: representative_auth
  params:
    required_role: REP

enrich:
  plugin: generic_enrich
  params:
    fields_to_inject: [region]

intent:
  plugin: llm_classifier
  params:
    provider: ${env:MA_INTENT_LLM_PROVIDER}
    model: ${env:MA_INTENT_LLM_MODEL}
    labels: [metagc, uniioc, knowledge_center]
    prompt_template: prompts/intent/representative.txt
    base_url: ${env:MA_INTENT_LLM_BASE_URL}
    api_key: ${env:MA_INTENT_LLM_API_KEY}
  retry:
    max_attempts: 2
    backoff_ms: 1000

graph:
  nodes:
    - id: metagc_adapter
      adapter: metagc
      output: true
      params:
        base_url: ${env:MA_METAGC_BASE_URL}
        timeout_ms: 30000
      retry:
        max_attempts: 2
        backoff_ms: 2000

    - id: uniioc_adapter
      adapter: uniioc
      output: true
      params:
        base_url: ${env:MA_UNIIOC_BASE_URL}
        timeout_ms: 30000
      retry:
        max_attempts: 2
        backoff_ms: 2000

    - id: kc_adapter
      adapter: knowledge_center
      output: true
      params:
        ws_url: ${env:MA_KC_WS_URL}
        timeout_ms: 30000
      retry:
        max_attempts: 2
        backoff_ms: 2000

  edges:
    - from: intent
      type: conditional
      route_by: route
      mapping:
        metagc: metagc_adapter
        uniioc: uniioc_adapter
        knowledge_center: kc_adapter

biz_params_schema:
  type: object
  required: [region]
  properties:
    region:
      type: string

error_messages:
  FORBIDDEN_TOPIC: "您暂无权限使用代表小管家。"
  FORBIDDEN_SCOPE: "您当前的角色无法查询这部分数据。"
  DOWNSTREAM_TIMEOUT: "服务繁忙，请稍后再试。"
  DOWNSTREAM_ERROR: "查询遇到问题，请稍后再试或联系管理员。"
  INTERNAL: "服务异常，请稍后再试。"
